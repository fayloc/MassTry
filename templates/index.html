<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MassTry Chat</title>

    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
        }

        #chat {
            width: 90%;
            height: 400px;
            margin: 20px auto;
            border: 1px solid #444;
            overflow-y: scroll;
            padding: 10px;
            background: #222;
        }

        input {
            width: 70%;
            padding: 10px;
        }

        button {
            padding: 10px;
        }

        .msg {
            text-align: left;
            margin: 5px 0;
        }
    </style>
</head>

<body>

<h2>💬 MassTry Chat</h2>

<div id="chat"></div>

<input id="msg" placeholder="Введите сообщение...">
<button onclick="sendMsg()">Отправить</button>

<script>
    var socket = io();

    socket.on("message", function(data) {
        let chat = document.getElementById("chat");
        chat.innerHTML += "<div class='msg'>" + data + "</div>";
        chat.scrollTop = chat.scrollHeight;
    });

    function sendMsg() {
        let input = document.getElementById("msg");
        if (input.value.trim() !== "") {
            socket.send(input.value);
            input.value = "";
        }
    }
</script>

</body>
</html>

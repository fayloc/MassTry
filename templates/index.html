<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MassTry Chat</title>

    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            margin-top: 15px;
        }

        #chat {
            width: 90%;
            max-width: 700px;
            height: 70vh;
            background: #1e1e1e;
            border-radius: 10px;
            padding: 10px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .msg {
            background: #2a2a2a;
            padding: 8px 10px;
            margin: 6px 0;
            border-radius: 8px;
            word-wrap: break-word;
        }

        .system {
            color: #aaa;
            font-style: italic;
        }

        #inputArea {
            width: 90%;
            max-width: 700px;
            display: flex;
            margin-top: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        button {
            margin-left: 10px;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            background: #4caf50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #43a047;
        }
    </style>
</head>

<body>

<h2>💬 MassTry Chat</h2>

<div id="chat"></div>

<div id="inputArea">
    <input id="msg" placeholder="Введите сообщение...">
    <button onclick="sendMsg()">Отправить</button>
</div>

<script>
    var socket = io();

    let name = prompt("Введите имя:");
    if (!name) name = "Anon";

    socket.emit("join", name);

    const chat = document.getElementById("chat");

    socket.on("message", function(data) {
        const div = document.createElement("div");

        if (data.includes("вошёл") || data.includes("вышел")) {
            div.classList.add("msg", "system");
        } else {
            div.classList.add("msg");
        }

        div.innerText = data;
        chat.appendChild(div);

        chat.scrollTop = chat.scrollHeight;
    });

    function sendMsg() {
        const input = document.getElementById("msg");
        const text = input.value;

        if (text.trim() !== "") {
            socket.send(text);
            input.value = "";
        }
    }

    document.addEventListener("keydown", function(e) {
        if (e.key === "Enter") sendMsg();
    });
</script>

</body>
</html>
